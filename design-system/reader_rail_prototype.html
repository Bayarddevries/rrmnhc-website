<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRMNHC | Reader Rail Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { 
            background-color: #0a0a0a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        /* Tablet Bezel */
        .device-bezel {
            width: 1024px; height: 768px;
            background: linear-gradient(145deg, #222, #000);
            border: 12px solid #111;
            border-radius: 50px; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            position: relative; 
            padding: 10px;
        }
        .glass-screen { 
            width: 100%; height: 100%; 
            background: var(--rrmnhc-parchment); 
            border-radius: 35px;
            position: relative; 
            overflow: hidden;
        }
        
        /* UI Layout */
        .interface-container {
            display: flex; flex-direction: column; height: 100%; width: 100%;
        }

        /* Top Selection Bar */
        .name-selector {
            display: flex; justify-content: center; gap: 40px;
            padding: 40px 0; border-bottom: 1px solid var(--rrmnhc-border);
            background: rgba(0,0,0,0.03);
        }
        .name-btn {
            font-family: var(--font-cinzel); text-transform: uppercase;
            letter-spacing: 0.2em; font-size: 14px; cursor: pointer;
            transition: 0.3s; color: #888;
        }
        .name-btn.active { color: var(--rrmnhc-crimson); font-weight: 700; }

        /* Main Content Area */
        .content-area {
            display: grid; grid-template-columns: 1fr 1.2fr; 
            flex-grow: 1; align-items: center; padding: 0 60px;
            gap: 60px;
        }
        .portrait-frame {
            width: 100%; aspect-ratio: 1/1;
            border: 1px solid var(--rrmnhc-border); padding: 20px;
            background: var(--rrmnhc-white); box-shadow: var(--shadow-md);
        }
        .portrait-img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(0.1);
        }
        .text-frame { display: flex; flex-direction: column; justify-content: center; }

        /* Audio Trigger */
        .audio-trigger {
            margin-top: 3rem; display: inline-flex; align-items: center; gap: 15px;
            font-family: var(--font-cinzel); font-weight: 700; color: var(--rrmnhc-crimson);
            cursor: pointer; transition: 0.3s; width: max-content;
            text-transform: uppercase; letter-spacing: 0.1em; font-size: 14px;
        }
        .audio-trigger:hover { transform: translateX(10px); opacity: 0.8; }

        .doc-texture { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div class="device-bezel">
        <div class="glass-screen">
            <div class="doc-texture"></div>

            <div class="interface-container">
                <!-- NAME SELECTOR -->
                <div class="name-selector">
                    <span onclick="updatePerson('riel')" id="btn-riel" class="name-btn active">Louis Riel</span>
                    <span onclick="updatePerson('campbell')" id="btn-campbell" class="name-btn">Maria Campbell</span>
                    <span onclick="updatePerson('dumont')" id="btn-dumont" class="name-btn">Gabriel Dumont</span>
                </div>

                <!-- MAIN CONTENT -->
                <div class="content-area">
                    <div class="portrait-frame">
                        <img id="person-image" src="../assets/img/voices/riel_portrait.jpg" class="portrait-img">
                    </div>
                    <div class="text-frame">
                        <h2 id="person-name" class="text-4xl font-bold mb-6 serif text-red-800 cinzel">Louis Riel</h2>
                        <p id="person-quote" class="text-3xl font-bold serif italic mb-8 leading-tight text-gray-800">
                            "My people will sleep for one hundred years, but when they awake, it will be the artists who give them their spirit back."
                        </p>
                        <p id="person-source" class="text-lg opacity-60 mb-10 leading-relaxed">
                            The visionary leader and founder of the Métis Provisional Government.
                        </p>
                        <div onclick="playAudio()" class="audio-trigger">
                            <span class="text-2xl">🔊</span> Listen to Voice
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const people = {
            riel: {
                name: "Louis Riel",
                quote: '"My people will sleep for one hundred years, but when they awake, it will be the artists who give them their spirit back."',
                source: "The visionary leader and founder of the Métis Provisional Government.",
                image: "../assets/img/voices/riel_portrait.jpg",
                audio: "../assets/audio/voices/riel_prophetic.ogg"
            },
            campbell: {
                name: "Maria Campbell",
                quote: '"I was a halfbreed, and that meant I was nothing. I was not white, and I was not Indian."',
                source: "Author of 'Halfbreed', exploring the erasure of Métis identity.",
                image: "../assets/img/voices/campbell_portrait.jpg",
                audio: "../assets/audio/voices/campbell_identity.ogg"
            },
            dumont: {
                name: "Gabriel Dumont",
                quote: '"Tant que nous aurons une goutte de sang français et indien..."',
                source: "The master scout and military strategist of the 1885 Resistance.",
                image: "../assets/img/voices/dumont_portrait.jpg",
                audio: "../assets/audio/voices/dumont_identity.ogg"
            }
        };

        let currentPerson = 'riel';

        function updatePerson(id) {
            currentPerson = id;
            const data = people[id];
            
            // Update Content
            document.getElementById('person-name').innerText = data.name;
            document.getElementById('person-quote').innerText = data.quote;
            document.getElementById('person-source').innerText = data.source;
            document.getElementById('person-image').src = data.image;

            // Update Navigation Buttons
            document.querySelectorAll('.name-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
        }

        function playAudio() {
            const audio = new Audio(people[currentPerson].audio);
            audio.play();
        }
    </script>
</body>
</html>
