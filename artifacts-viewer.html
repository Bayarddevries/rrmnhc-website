<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Artifacts | RRMNHC</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
 <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
 <script src="./shared/nav.js"></script>
 <style>
  :root {
   --light-parchment: #fdfcf9;
   --soft-cream: #f4f1ea;
   --text-dark: #2c2c2c;
   --crimson: #8b0000;
  }

  body {
   background-color: var(--light-parchment);
   color: var(--text-dark);
   font-family: 'Inter', sans-serif;
   overflow-x: hidden;
  }

  h1, h2, h3, .serif {
   font-family: 'Playfair Display', serif;
  }

  .cinzel {
   font-family: 'Cinzel', serif;
  }

  .beadwork-divider {
   height: 12px;
   background-image: radial-gradient(var(--crimson) 2px, transparent 2px);
   background-size: 10px 10px;
   width: 100%;
   opacity: 0.4;
  }

  .doc-texture {
   position: fixed;
   top: 0;
   left: 0;
   width: 100%;
   height: 100%;
   opacity: 0.35;
   pointer-events: none;
   z-index: 50;
   background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
  }

  .artifact-card {
   background: white;
   border: 1px solid rgba(0,0,0,0.06);
   transition: transform 0.3s ease, box-shadow 0.3s ease;
   cursor: pointer;
  }
  .artifact-card:hover {
   transform: translateY(-6px);
   box-shadow: 0 16px 40px rgba(139,0,0,0.1);
  }
  .artifact-card:hover .card-icon {
   color: var(--crimson);
  }

  .card-icon {
   color: #bbb;
   transition: color 0.3s ease;
  }

  .viewer-overlay {
   background: rgba(0,0,0,0.85);
   backdrop-filter: blur(4px);
   opacity: 0;
   pointer-events: none;
   transition: opacity 0.4s ease;
   z-index: 200;
  }
  .viewer-overlay.active {
   opacity: 1;
   pointer-events: all;
  }

  #viewer-canvas {
   width: 100%;
   height: 100%;
   display: block;
  }

  .viewer-close {
   position: absolute;
   top: 1.5rem;
   right: 1.5rem;
   width: 2.5rem;
   height: 2.5rem;
   border-radius: 50%;
   background: rgba(255,255,255,0.1);
   border: 1px solid rgba(255,255,255,0.2);
   color: white;
   display: flex;
   align-items: center;
   justify-content: center;
   cursor: pointer;
   transition: background 0.2s;
   z-index: 210;
  }
  .viewer-close:hover {
   background: rgba(255,255,255,0.2);
  }

  .model-label {
   position: absolute;
   bottom: 1.5rem;
   left: 1.5rem;
   background: var(--crimson);
   color: white;
   padding: 0.5rem 1rem;
   font-family: 'Cinzel', serif;
   font-size: 0.65rem;
   letter-spacing: 0.15em;
   text-transform: uppercase;
   z-index: 210;
  }

  .viewer-hint {
   position: absolute;
   bottom: 1.5rem;
   right: 1.5rem;
   color: rgba(255,255,255,0.4);
   font-size: 0.7rem;
   letter-spacing: 0.05em;
   z-index: 210;
  }

  .viewer-loading {
   position: absolute;
   inset: 0;
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: center;
   background: #000;
   color: rgba(255,255,255,0.6);
   font-size: 0.8rem;
   letter-spacing: 0.1em;
   text-transform: uppercase;
  }

  @keyframes pulse-ring {
   0% { transform: scale(0.8); opacity: 1; }
   100% { transform: scale(1.4); opacity: 0; }
  }

  .loading-ring {
   width: 40px;
   height: 40px;
   border: 2px solid rgba(139,0,0,0.3);
   border-top-color: var(--crimson);
   border-radius: 50%;
   animation: spin 1s linear infinite;
   margin-bottom: 1rem;
  }

  @keyframes spin {
   to { transform: rotate(360deg); }
  }
 </style>
</head>
<body class="relative">
 <div class="doc-texture"></div>

 <!-- Navigation -->
 <nav class="site-nav fixed top-0 left-0 w-full z-[100] px-6 py-5 flex justify-between items-center bg-[#fdfcf9]/90 backdrop-blur-md border-b border-gray-100/50"></nav>

 <!-- Page Header -->
 <header class="pt-36 pb-10 px-6 text-center">
  <p class="cinzel text-xs tracking-[0.25em] text-red-800 mb-4 uppercase">Digital Heritage Collection</p>
  <h1 class="text-4xl md:text-5xl font-bold text-[#1a1a1a] mb-3">Artifact Gallery</h1>
  <div class="w-12 h-0.5 bg-red-800 mx-auto mb-4"></div>
  <p class="text-base opacity-60 max-w-xl mx-auto">Interactive 3D scans from the RRMNHC archive. Rotate, zoom, and explore each artifact.</p>
 </header>

 <div class="beadwork-divider mb-12"></div>

 <!-- Artifact Grid -->
 <main class="max-w-6xl mx-auto px-6 pb-24">
  <div id="artifact-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
 </main>

 <!-- 3D Viewer Overlay -->
 <div id="viewer-overlay" class="viewer-overlay fixed inset-0">
  <button class="viewer-close" onclick="closeViewer()" aria-label="Close viewer">
   <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
    <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
   </svg>
  </button>
  <div id="viewer-label" class="model-label"></div>
  <div id="viewer-hint" class="viewer-hint">Drag to rotate · Scroll to zoom</div>
  <div id="viewer-container" style="position:absolute;inset:0;background:#000;"></div>
  <div id="viewer-loading" class="viewer-loading">
   <div class="loading-ring"></div>
   Loading model
  </div>
 </div>

 <div class="beadwork-divider"></div>

 <!-- Footer -->
 <footer class="py-10 px-6 text-center opacity-50">
  <p class="cinzel text-xs tracking-widest mb-1">335 Main Street, Winnipeg, MB</p>
  <p class="text-[11px]">&copy; 2026 Red River Métis National Heritage Centre</p>
 </footer>

 <script>initNav();</script>

 <script>
  const serverRoot = './';
  const artifacts = [
   {
    filename: "Scaniverse 2026-02-04 130448.glb",
    displayName: "February 4, 2026 — 13:04",
    size: "18.3 MB",
    path: `./Artifacts/Scaniverse 2026-02-04 130448.glb`
   },
   {
    filename: "Scaniverse 2026-02-04 131557.glb",
    displayName: "February 4, 2026 — 13:15",
    size: "14.8 MB",
    path: `./Artifacts/Scaniverse 2026-02-04 131557.glb`
   },
   {
    filename: "Scaniverse 2026-04-15 125610.glb",
    displayName: "April 15, 2026 — 12:56",
    size: "18.2 MB",
    path: `./Artifacts/Scaniverse 2026-04-15 125610.glb`
   },
   {
    filename: "Scaniverse 2026-04-15 141311.glb",
    displayName: "April 15, 2026 — 14:13",
    size: "17.5 MB",
    path: `./Artifacts/Scaniverse 2026-04-15 141311.glb`
   },
   {
    filename: "Scaniverse 2026-04-15 143348.glb",
    displayName: "April 15, 2026 — 14:33",
    size: "14.9 MB",
    path: `./Artifacts/Scaniverse 2026-04-15 143348.glb`
   }
  ];

  let currentAnimationId = null;
  let renderer = null;

  function renderGrid() {
   const grid = document.getElementById('artifact-grid');
   grid.innerHTML = artifacts.map((a, i) => `
    <div class="artifact-card rounded-sm p-0 overflow-hidden" onclick="openViewer(${i})">
     <div class="aspect-square bg-[#f4f1ea] flex flex-col items-center justify-center border-b border-gray-100 overflow-hidden">
      <img src="./previews/${i + 1}.PNG" alt="${a.displayName}" class="w-full h-full object-cover">
     </div>
     <div class="p-5">
      <p class="text-xs text-gray-400 tracking-widest uppercase mb-1">${a.size}</p>
      <h3 class="text-base font-semibold text-[#1a1a1a] leading-snug">${a.displayName}</h3>
      <p class="text-[11px] text-gray-400 mt-1 truncate">${a.filename}</p>
      <div class="mt-4 flex items-center gap-1 text-red-800 text-xs font-semibold tracking-widest uppercase">
       View in 3D
       <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 6h8M7 3l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
       </svg>
      </div>
     </div>
    </div>
   `).join('');
  }

  function closeViewer() {
   const overlay = document.getElementById('viewer-overlay');
   overlay.classList.remove('active');
   if (currentAnimationId) {
    cancelAnimationFrame(currentAnimationId);
    currentAnimationId = null;
   }
   if (renderer) {
    renderer.dispose();
    renderer = null;
   }
   document.getElementById('viewer-container').innerHTML = '';
   document.getElementById('viewer-loading').style.display = 'flex';
  }

  function openViewer(index) {
   const artifact = artifacts[index];
   const overlay = document.getElementById('viewer-overlay');
   overlay.classList.add('active');
   document.getElementById('viewer-label').textContent = artifact.displayName;
   document.getElementById('viewer-loading').style.display = 'flex';

   const container = document.getElementById('viewer-container');
   container.innerHTML = '';

   const scene = new THREE.Scene();
   scene.background = new THREE.Color(0x000000);

   const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.01, 1000);
   camera.position.set(2, 1.5, 2);

   renderer = new THREE.WebGLRenderer({ antialias: true });
   renderer.setSize(container.clientWidth, container.clientHeight);
   renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
   renderer.outputEncoding = THREE.sRGBEncoding;
   renderer.toneMapping = THREE.ACESFilmicToneMapping;
   renderer.toneMappingExposure = 1.2;
   container.appendChild(renderer.domElement);

   const ambient = new THREE.AmbientLight(0xffffff, 0.6);
   scene.add(ambient);

   const key = new THREE.DirectionalLight(0xffffff, 0.8);
   key.position.set(3, 5, 3);
   scene.add(key);

   const fill = new THREE.DirectionalLight(0xffffff, 0.3);
   fill.position.set(-3, 2, -2);
   scene.add(fill);

   const rim = new THREE.DirectionalLight(0xffffff, 0.2);
   rim.position.set(0, -2, -4);
   scene.add(rim);

   const controls = new THREE.OrbitControls(camera, renderer.domElement);
   controls.enableDamping = true;
   controls.dampingFactor = 0.05;
   controls.minDistance = 0.3;
   controls.maxDistance = 20;
   controls.enablePan = false;

   const loader = new THREE.GLTFLoader();
   loader.load(
    artifact.path,
    (gltf) => {
     const model = gltf.scene;
     const box = new THREE.Box3().setFromObject(model);
     const center = box.getCenter(new THREE.Vector3());
     const size = box.getSize(new THREE.Vector3());
     const maxDim = Math.max(size.x, size.y, size.z);
     const scale = 1.5 / maxDim;
     model.scale.setScalar(scale);
     model.position.sub(center.multiplyScalar(scale));
     scene.add(model);
     document.getElementById('viewer-loading').style.display = 'none';
    },
    null,
    (err) => {
     console.error('GLB load error:', err);
     document.getElementById('viewer-loading').innerHTML = '<span style="color:#c44;">Load failed — check server path</span>';
    }
   );

   const onResize = () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
   };
   window.addEventListener('resize', onResize);

   function animate() {
    currentAnimationId = requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
   }
   animate();
  }

  renderGrid();
 </script>
</body>
</html>
