<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Artifacts | RRMNHC</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
 <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="./shared/site-nav.js"></script>
 
 <script>
  const artifacts = [
   {
    filename: "1.glb",
    displayName: "Scaniverse 2026-02-04 — 13:04",
    size: "18.3 MB",
    path: "./Artifacts/1.glb"
   },
   {
    filename: "2.glb",
    displayName: "Scaniverse 2026-02-04 — 13:15",
    size: "14.8 MB",
    path: "./Artifacts/2.glb"
   },
   {
    filename: "3.glb",
    displayName: "Scaniverse 2026-04-15 — 12:56",
    size: "18.2 MB",
    path: "./Artifacts/3.glb"
   },
   {
    filename: "4.glb",
    displayName: "Scaniverse 2026-04-15 — 14:13",
    size: "17.5 MB",
    path: "./Artifacts/4.glb"
   },
   {
    filename: "5.glb",
    displayName: "Scaniverse 2026-04-15 — 14:33",
    size: "14.9 MB",
    path: "./Artifacts/5.glb"
   }
  ];
 
  let currentAnimationId = null;
  let renderer = null;
 
  function renderGrid() {
   const grid = document.getElementById('artifact-grid');
   grid.innerHTML = artifacts.map((a, i) => `
    <div class="artifact-card rounded-sm p-0 overflow-hidden" onclick="openViewer(${i})">
     <div class="aspect-square bg-[#f4f1ea] flex flex-col items-center justify-center border-b border-gray-100 overflow-hidden">
      <img src="./Artifacts/Thumbnails/${i + 1}.PNG" alt="${a.displayName}" class="w-full h-full object-cover">
     </div>
     <div class="p-5">
      <p class="text-xs text-gray-400 tracking-widest uppercase mb-1">${a.size}</p>
      <h3 class="text-base font-semibold text-[#1a1a1a] leading-snug">${a.displayName}</h3>
      <p class="text-[11px] text-gray-400 mt-1 truncate">${a.filename}</p>
      <div class="mt-4 flex items-center gap-1 text-red-800 text-xs font-semibold tracking-widest uppercase">
       View in 3D
       <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 6h8M7 3l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
       </svg>
      </div>
     </div>
    </div>
   `).join('');
  }
 
  function closeViewer() {
   const overlay = document.getElementById('viewer-overlay');
   overlay.classList.remove('active');
   if (currentAnimationId) {
    cancelAnimationFrame(currentAnimationId);
    currentAnimationId = null;
   }
   if (renderer) {
    renderer.dispose();
    renderer = null;
   }
   document.getElementById('viewer-container').innerHTML = '';
   document.getElementById('viewer-loading').style.display = 'flex';
  }
 
  function openViewer(index) {
   const artifact = artifacts[index];
   const overlay = document.getElementById('viewer-overlay');
   overlay.classList.add('active');
   document.getElementById('viewer-label').textContent = artifact.displayName;
   document.getElementById('viewer-loading').style.display = 'flex';
 
   const container = document.getElementById('viewer-container');
   container.innerHTML = '';
 
   const scene = new THREE.Scene();
   scene.background = new THREE.Color(0x000000);
 
   const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.01, 1000);
   camera.position.set(2, 1.5, 2);
 
   renderer = new THREE.WebGLRenderer({ antialias: true });
   renderer.setSize(container.clientWidth, container.clientHeight);
   renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
   renderer.outputEncoding = THREE.sRGBEncoding;
   renderer.toneMapping = THREE.ACESFilmicToneMapping;
   renderer.toneMappingExposure = 1.2;
   container.appendChild(renderer.domElement);
 
   const ambient = new THREE.AmbientLight(0xffffff, 0.6);
   scene.add(ambient);
 
   const key = new THREE.DirectionalLight(0xffffff, 0.8);
   key.position.set(3, 5, 3);
   scene.add(key);
 
   const fill = new THREE.DirectionalLight(0xffffff, 0.3);
   fill.position.set(-3, 2, -2);
   scene.add(fill);
 
   const rim = new THREE.DirectionalLight(0xffffff, 0.2);
   rim.position.set(0, -2, -4);
   scene.add(rim);
 
   const controls = new THREE.OrbitControls(camera, renderer.domElement);
   controls.enableDamping = true;
   controls.dampingFactor = 0.05;
   controls.minDistance = 0.3;
   controls.maxDistance = 20;
   controls.enablePan = false;
 
   const loader = new THREE.GLTFLoader();
   loader.load(
    artifact.path,
    (gltf) => {
     const model = gltf.scene;
     const box = new THREE.Box3().setFromObject(model);
     const center = box.getCenter(new THREE.Vector3());
     const size = box.getSize(new THREE.Vector3());
     const maxDim = Math.max(size.x, size.y, size.z);
     const scale = 1.5 / maxDim;
     model.scale.setScalar(scale);
     model.position.sub(center.multiplyScalar(scale));
     scene.add(model);
     document.getElementById('viewer-loading').style.display = 'none';
    },
    null,
    (err) => {
     console.error('GLB load error:', err);
     document.getElementById('viewer-loading').innerHTML = '<span style="color:#c44;">Load failed — check server path</span>';
    }
   );
 
   const onResize = () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
   };
   window.addEventListener('resize', onResize);
 
   function animate() {
    currentAnimationId = requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
   }
   animate();
  }
 
  renderGrid();
 </script>
 
 <script>
</body>
</html>
